# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

recorder:
  purge_keep_days: 30
  exclude:
    entities:
      - sensor.solarassistant_battery_power
      - sensor.solarassistant_grid_power
      - sensor.solarassistant_load_power
      - sensor.solarassistant_pv_power
  include:
    entities:
      - sensor.solarassistant_battery_state_of_charge
      - sensor.solarassistant_battery_energy_in
      - sensor.solarassistant_battery_energy_out
      - sensor.pv_power_mean_2m
      - sensor.load_power_mean_2m
      - sensor.grid_power_mean_2m
      - sensor.battery_power_mean_2m
      - sensor.wallbox_charging_power_mean_2m
      - sensor.battery_discharge_w_discharge_positive
      - sensor.battery_discharge_w_discharge_negative
   

sensor:
  - platform: statistics
    name: "PV power mean 2m"
    entity_id: sensor.solarassistant_pv_power
    state_characteristic: mean
    max_age:
      minutes: 2

  - platform: statistics
    name: "Load power mean 2m"
    entity_id: sensor.solarassistant_load_power
    state_characteristic: mean
    max_age:
      minutes: 2

  - platform: statistics
    name: "Grid power mean 2m"
    entity_id: sensor.solarassistant_grid_power
    state_characteristic: mean
    max_age:
      minutes: 2

  - platform: statistics
    name: "Battery power mean 2m"
    entity_id: sensor.solarassistant_battery_power
    state_characteristic: mean
    max_age:
      minutes: 2

  - platform: statistics
    name: "Wallbox charging power mean 2m"
    entity_id: sensor.wallbox_pulsar_plus_sn_1331793_charging_power
    state_characteristic: mean
    max_age:
      minutes: 2

template:
  - sensor:
      # Use ONE of these in automations, depending on how Solar Assistant signs battery power on your setup.
      # The correct one will read close to your actual discharge watts when the battery is discharging.
      - name: "Battery discharge W, discharge positive"
        unique_id: battery_discharge_w_discharge_positive
        unit_of_measurement: "W"
        state: >
          {% set p = states('sensor.battery_power_mean_2m') | float(0) %}
          {{ p if p > 0 else 0 }}

      - name: "Battery discharge W, discharge negative"
        unique_id: battery_discharge_w_discharge_negative
        unit_of_measurement: "W"
        state: >
          {% set p = states('sensor.battery_power_mean_2m') | float(0) %}
          {{ (0 - p) if p < 0 else 0 }}

input_boolean:
  ev_max_charge_override:
    name: EV Max Charge Override
    icon: mdi:lightning-bolt

  ev_throttle_active:
    name: EV Throttle Active
    icon: mdi:speedometer_slow